<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Link in Bio | @Namamu</title>
    <!-- Phosphor Icons CDN - ringan & premium -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 20% 50%, #f8bf9b, #e26d5c);
            min-height: 100vh;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card transparan (glassmorphism ringan) */
        .glass-card {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 32px 24px 44px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        /* Profil */
        .profile {
            text-align: center;
            margin-bottom: 28px;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
            margin-bottom: 14px;
        }

        .name {
            font-size: 1.7rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .bio {
            color: rgba(255, 255, 255, 0.85);
            margin-top: 6px;
            font-size: 0.9rem;
            line-height: 1.4;
            max-width: 85%;
            margin-left: auto;
            margin-right: auto;
        }

        /* Statistik ringan */
        .stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 16px 0 24px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        /* Daftar tautan - transparan juga tapi tetap terbaca */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 20px 0 28px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 12px 20px;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.01);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Phosphor icon styling */
        .link-left i {
            font-size: 1.5rem;
            color: white;
        }

        .arrow i {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            transition: transform 0.2s;
        }

        .link-btn:hover .arrow i {
            transform: translateX(4px);
            color: white;
        }

        /* Social row */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .social-icon {
            font-size: 0;
            text-decoration: none;
            transition: transform 0.15s;
            background: rgba(255, 255, 255, 0.2);
            width: 44px;
            height: 44px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .social-icon i {
            font-size: 1.5rem;
            color: white;
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        hr {
            margin: 22px 0 14px;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .footer {
            text-align: center;
            margin-top: 8px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="profile">
        <img class="avatar" src="https://placehold.co/400x400/ffffff/999999?text=🍔" alt="avatar">
        <div class="name">@KulineranFood</div>
        <div class="bio">
            🍜 Food reviewer & direktori kuliner <br>

    <!-- Stat minimalis -->
    <div class="stats">

        </div>
        <div class="stat-item">

            <div class="stat-label">Reviews</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">50+</div>

    </div>

    <!-- Daftar link in bio -->
    <div class="links">
        <a href="#" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="link-left">
                <i class="ph ph-tiktok-logo"></i>
                <span>TikTok - Review Viral</span>
            </div>
            <div class="arrow"><i class="ph ph-arrow-right"></i></div>
        </a>

        <a href="#" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="link-left">
                <i class="ph ph-instagram-logo"></i>
                <span>Instagram - Food Daily</span>
            </div>
            <div class="arrow"><i class="ph ph-arrow-right"></i></div>
        </a>

        <a href="#" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="link-left">
                <i class="ph ph-binoculars"></i>
                <span>Direktori Kuliner Terbaru</span>
            </div>
            <div class="arrow"><i class="ph ph-arrow-right"></i></div>
        </a>

        <a href="#" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="link-left">
                <i class="ph ph-fire"></i>
                <span>Rekomendasi Viral Minggu Ini</span>
            </div>
            <div class="arrow"><i class="ph ph-arrow-right"></i></div>
        </a>

        <a href="#" target="_blank" rel="noopener noreferrer" class="link-btn">
            <div class="link-left">
                <i class="ph ph-whatsapp-logo"></i>
                <span>Kerjasama / Endorse</span>
            </div>
            <div class="arrow"><i class="ph ph-arrow-right"></i></div>
        </a>
    </div>

    <!-- Sosial media icon circle -->
    <div class="social-row">
        <a href="#" class="social-icon"><i class="ph ph-youtube-logo"></i></a>
        <a href="#" class="social-icon"><i class="ph ph-twitter-logo"></i></a>
        <a href="#" class="social-icon"><i class="ph ph-tiktok-logo"></i></a>
        <a href="#" class="social-icon"><i class="ph ph-envelope"></i></a>
    </div>

    <hr>
    <div class="footer">
        📧 kulineran@email.com | #FoodHunter
    </div>
</div>

</body>
</html>
