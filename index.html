<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisha Putri | Digital Portfolio</title>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts: Outfit (Modern & Geometric) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Palette Premium: Deep Navy & Gold */
            --primary: #0f172a;       /* Slate 900 - Teks utama */
            --text-muted: #64748b;    /* Slate 500 - Teks sekunder */
            --accent: #d4a017;        /* Metallic Gold - Aksen */
            --bg-glass: rgba(255, 255, 255, 0.85); /* Putih transparan */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* Background halus */
            --shadow-soft: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
            --shadow-float: 0 10px 25px rgba(0,0,0,0.1);
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a; /* Background gelap di luar agar card menonjol */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--primary);
        }

        /* Container Utama (Card) */
        .card-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: fadeIn 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        /* Dekorasi Background Halus */
        .card-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 160, 23, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Header Profile */
        .header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
            z-index: 1;
        }

        .avatar-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: var(--transition);
        }

        .status-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 18px;
            height: 18px;
            background: #10b981; /* Hijau online */
            border: 3px solid white;
            border-radius: 50%;
        }

        .name {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .role {
            font-size: 0.95rem;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            background: rgba(212, 160, 23, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Links Section */
        .links-section {
            margin-bottom: 35px;
            position: relative;
            z-index: 1;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: block;
            text-align: center;
        }

        .link-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 12px;
            background: white;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        .link-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 160, 23, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-color: var(--accent);
            color: var(--primary);
        }

        .link-btn:hover::after {
            transform: translateX(100%);
        }

        .link-icon {
            font-size: 1.4rem;
            color: var(--accent);
            margin-right: 15px;
            min-width: 24px;
            text-align: center;
        }

        .link-text {
            flex-grow: 1;
            text-align: left;
        }

        /* Portfolio Grid */
        .portfolio-section {
            position: relative;
            z-index: 1;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .portfolio-item {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            aspect-ratio: 1 / 1; /* Kotak sempurna */
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .portfolio-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.9), transparent);
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
            display: flex;
            align-items: flex-end;
        }

        .portfolio-title {
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .portfolio-cat {
            color: var(--accent);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Hover Effects Portfolio */
        .portfolio-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .portfolio-item:hover img {
            transform: scale(1.1);
        }

        .portfolio-item:hover .portfolio-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        .footer-text {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .social-link {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .social-link:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .social-link i {
            font-size: 1.2rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card-container {
                padding: 30px 20px;
            }
            .name {
                font-size: 1.4rem;
            }
            .portfolio-grid {
                grid-template-columns: 1fr; /* Stack di HP */
            }
        }
    </style>
</head>
