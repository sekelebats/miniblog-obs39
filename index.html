<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisha Putri | Framer Style Portfolio</title>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts: Inter (Framer's go-to font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Framer-Inspired Palette */
            --bg: #0a0a0a;            /* Deep black background */
            --surface: #171717;       /* Slightly lighter surface */
            --text: #ffffff;          /* Pure white text */
            --text-muted: #a3a3a3;    /* Muted gray text */
            --accent: #3b82f6;        /* Vibrant blue (Framer-like) */
            --accent-glow: rgba(59, 130, 246, 0.3);
            --border: #262626;        /* Subtle border */
            --radius: 12px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.5);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.6);
            --transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Subtle background gradient glow */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0.4;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 60px;
            position: relative;
            z-index: 1;
        }

        /* --- HEADER --- */
        .header {
            text-align: left;
            animation: fadeIn 0.8s ease-out;
        }

        .name {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .role-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        /* --- LINKS (Framer-style cards) --- */
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .link-card:hover {
            border-color: #404040;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .link-card:hover::before {
            transform: translateX(100%);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .link-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text);
            transition: var(--transition);
        }

        .link-card:hover .link-icon {
            background: var(--accent);
            color: #fff;
        }

        .link-text {
            font-weight: 600;
            font-size: 1rem;
        }

        .link-arrow {
            opacity: 0.5;
            transition: var(--transition);
        }

        .link-card:hover .link-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* --- PORTFOLIO GRID --- */
        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .portfolio-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-decoration: none;
            color: var(--text);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 180px;
        }

        .portfolio-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent 60%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .portfolio-card:hover {
            border-color: #404040;
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .portfolio-card:hover::after {
            opacity: 1;
        }

        .portfolio-icon {
            font-size: 2.5rem;
            color: var(--accent);
            align-self: flex-start;
        }

        .portfolio-info h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .portfolio-info p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* --- FOOTER --- */
        .footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            text-decoration: none;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        .copyright {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #52525b;
            text-align: center;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .name { font-size: 2.5rem; }
            .portfolio-grid { grid-template-columns: 1fr; }
            .portfolio-card { min-height: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header -->
        <header class="header">
            <h1 class="name">Aisha Putri</h1>
            <div class="role">
                <span class="role-dot"></span>
                Senior Product Designer
            </div>
        </header>

        <!-- Links -->
        <section class="links-section">
            <a href="https://linkedin.com/in/aishaputri" class="link-card" target="_blank">

                    <div class="link-icon"><i class="ph ph-linkedin-logo"></i></div>

            <a href="mailto:aisha.putri@email.com" class="link-card" target="_blank">

        <section>

                <a href="#" class="portfolio-card" target="_blank">

        <!-- Footer -->
        <footer class="footer">
            <a href="#" class="social-btn" target="_blank"><i class="ph ph-instagram-logo"></i></a>

            <a href="#" class="social-btn" target="_blank"><i class="ph ph-dribbble-logo"></i></a>
        </footer>

        <div class="copyright">
            © 2026 Aisha Putri. Built with Framer vibes.
        </div>

    </div>

</body>
</html>
