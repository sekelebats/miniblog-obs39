<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisha Putri | Portfolio</title>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts: Plus Jakarta Sans (Clean & Modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Palette: Warm Paper & Deep Blue */
            --bg-paper: #f9f7f2;      /* Warna kertas krem */
            --text-main: #1e293b;     /* Slate 800 - Hitam lembut */
            --text-sub: #475569;      /* Slate 600 */
            --accent: #0f172a;        /* Navy Gelap - Untuk hover */
            --btn-border: #cbd5e1;    /* Border tombol */
            --btn-shadow: rgba(15, 23, 42, 0.2);
            --icon-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            /* Teks tambahan untuk kesan kertas */
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Container Utama (Hanya pembatas lebar, tanpa background card) */
        .content-wrapper {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        /* Header Section */
        .header {
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .role {
            font-size: 1.1rem;
            font-weight: 600;
            color: #d97706; /* Gold accent */
            background: #fffbeb;
            padding: 6px 20px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid #fcd34d;
        }

        /* Links Section */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 50px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px 24px;
            background: white;
            border: 2px solid var(--btn-border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            
            /* Shadow Nyata & Terang */
            box-shadow: 0 4px 0 var(--btn-border), 
                        0 10px 20px var(--btn-shadow);
        }

        .link-btn i {
            font-size: 1.4rem;
            margin-right: 12px;
            color: var(--text-main);
        }

        .link-btn:hover {
            transform: translateY(-2px);
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 6px 0 #020617, 
                        0 15px 30px rgba(15, 23, 42, 0.3);
        }

        .link-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 var(--btn-border), 
                        0 2px 5px var(--btn-shadow);
        }

        /* Portfolio Section */
        .portfolio-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-sub);
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            height: 1px;
            background: #cbd5e1;
            flex-grow: 1;
            max-width: 100px;
            margin-left: 10px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .portfolio-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s;
        }

        .portfolio-icon-box {
            width: 80px;
            height: 80px;
            background: white;
            border: 2px solid var(--btn-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            
            /* Shadow sama dengan tombol */
            box-shadow: 0 4px 0 var(--btn-border), 
                        0 8px 15px var(--btn-shadow);
            
            transition: all 0.2s;
        }

        .portfolio-icon {
            font-size: 2.5rem;
            color: var(--icon-color);
        }

        .portfolio-item:hover .portfolio-icon-box {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 6px 0 var(--accent), 
                        0 12px 25px var(--btn-shadow);
        }

        .portfolio-item:hover .portfolio-icon {
            color: var(--accent);
        }

        .portfolio-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .portfolio-cat {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* Footer Socials */
        .footer {
            border-top: 1px solid #e2e8f0;
            padding-top: 30px;
            width: 100%;
        }

        .social-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: white;
            border: 2px solid var(--btn-border);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            
            box-shadow: 0 3px 0 var(--btn-border), 
                        0 6px 10px var(--btn-shadow);
            
            transition: all 0.2s;
        }

        .social-btn i {
            font-size: 1.4rem;
        }

        .social-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 5px 0 #020617, 
                        0 10px 20px rgba(15, 23, 42, 0.3);
            transform: translateY(-3px);
        }

        .footer-text {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            .portfolio-grid {
                grid-template-columns: 1fr; /* Stack vertikal di HP */
            }
            .portfolio-item {
                flex-direction: row;
                justify-content: center;
                gap: 15px;
                padding: 10px;
            }
            .portfolio-icon-box {
                margin-bottom: 0;
                width: 60px;
                height: 60px;
                border-radius: 12px;
            }
            .portfolio-title, .portfolio-cat {
                text-align: left;
            }
        }
    </style>
</head>
<body>

    <div class="content-wrapper">

            <div class="avatar-container">

                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&auto=format&fit=crop&w=200&q=80" alt="Aisha Putri" class="avatar">
            </div>

        </header>

        <!-- Link Utama -->
        <section class="links-grid">

            </a>
            
            <a href="mailto:aisha.putri@email.com" class="link-btn" target="_blank">

            </a>

        <section class="portfolio-section">
            <div class="section-title">Selected Works</div>
            
            <div class="portfolio-grid">
                <!-- Porto 1 -->
                <a href="#" class="portfolio-item" target="_blank">
                    <div class="portfolio-icon-box">
                        <i class="ph ph-device-mobile portfolio-icon"></i>
                    </div>
                    <div class="portfolio-info">
                        <div class="portfolio-title">Fintech App</div>
                        <div class="portfolio-cat">UX Case Study</div>
                    </div>
                </a>

                <!-- Porto 2 -->
                <a href="#" class="portfolio-item" target="_blank">
                    <div class="portfolio-icon-box">
                        <i class="ph ph-laptop portfolio-icon"></i>
                    </div>
                    <div class="portfolio-info">
                        <div class="portfolio-title">E-Commerce Web</div>
                        <div class="portfolio-cat">UI Design</div>
                    </div>
                </a>
            </div>
        </section>

        <!-- Footer Socials -->
        <footer class="footer">
            <div class="social-grid">
                <a href="#" class="social-btn" target="_blank">
                    <i class="ph ph-instagram-logo"></i>
                </a>
                <a href="#" class="social-btn" target="_blank">
                    <i class="ph ph-behance-logo"></i>
                </a>
                <a href="#" class="social-btn" target="_blank">
                    <i class="ph ph-dribbble-logo"></i>
                </a>
            </div>
            <div class="footer-text">© 2026 Aisha Putri. All Rights Reserved.</div>
        </footer>

    </div>

</body>
</html>
