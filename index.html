<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisha Putri | Minimalist Portfolio</title>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Palette Ultra-Minimalist */
            --bg-color: #f4f4f5;          /* Abu-abu sangat muda (hampir putih) */
            --primary-color: #18181b;     /* Charcoal/Deep Black (Warna utama) */
            --text-white: #ffffff;        /* Teks di atas background gelap */
            --shadow-float: 0 10px 30px -5px rgba(0, 0, 0, 0.08); /* Shadow halus & luas */
            --shadow-hover: 0 20px 40px -5px rgba(0, 0, 0, 0.15); /* Shadow lebih dalam saat hover */
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* Space antar section sangat lega */
        }

        /* --- HEADER SECTION --- */
        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar-icon {
            width: 100px;
            height: 100px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-white);
            font-size: 3rem;
            box-shadow: var(--shadow-float);
            transition: var(--transition);
        }

        .avatar-icon i {
            font-weight: bold;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-color);
            letter-spacing: -0.5px;
            margin: 0;
        }

        .role {
            font-size: 0.9rem;
            font-weight: 500;
            color: #71717a; /* Abu-abu netral */
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- LINKS SECTION --- */
        .links-grid {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .floating-btn {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Icon kiri, teks tengah, panah kanan */
            width: 100%;
            padding: 20px 24px;
            background: var(--primary-color);
            color: var(--text-white);
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            
            /* Hapus border, hanya shadow */
            box-shadow: var(--shadow-float);
            
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .floating-btn .btn-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .floating-btn i {
            font-size: 1.4rem;
            color: var(--text-white);
        }

        .floating-btn .arrow-icon {
            font-size: 1.2rem;
            opacity: 0.7;
            transition: transform 0.3s;
        }

        /* Hover Effect: Bayangan lebih dalam, tombol naik sedikit */
        .floating-btn:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .floating-btn:hover .arrow-icon {
            transform: translateX(4px);
            opacity: 1;
        }

        /* --- PORTFOLIO SECTION --- */
        .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a1a1aa;
            margin-bottom: 10px;
            align-self: flex-start;
            padding-left: 4px;
        }

        .portfolio-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .portfolio-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--primary-color);
            padding: 30px 10px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-white);
            box-shadow: var(--shadow-float);
            transition: var(--transition);
            text-align: center;
        }

        .portfolio-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .portfolio-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .portfolio-cat {
            font-size: 0.75rem;
            font-weight: 400;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .portfolio-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        /* --- FOOTER --- */
        .footer {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .social-icon {
            width: 44px;
            height: 44px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-white);
            text-decoration: none;
            box-shadow: var(--shadow-float);
            transition: var(--transition);
        }

        .social-icon i {
            font-size: 1.2rem;
        }

        .social-icon:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .copyright {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #a1a1aa;
            text-align: center;
        }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            .container {
                gap: 30px;
            }
            .portfolio-grid {
                grid-template-columns: 1fr; /* Stack vertikal di HP */
            }
            .portfolio-card {
                flex-direction: row;
                justify-content: flex-start;
                gap: 20px;
                padding: 20px 24px;
                text-align: left;
            }
            .portfolio-icon {
                margin-bottom: 0;
                font-size: 2rem;
            }
            .portfolio-info {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header: Icon Humanoid -->
        <header class="header">
            <div class="avatar-icon">
                <!-- Icon Phosphor: User (Humanoid) -->
                <i class="ph ph-user"></i>
            </div>
            <h1 class="name">Aisha Putri</h1>
            <div class="role">Senior Product Designer</div>
        </header>

        <!-- Links: Floating Buttons (No Border) -->
        <section class="links-grid">
            <a href="https://linkedin.com/in/aishaputri" class="floating-btn" target="_blank">
                <div class="btn-left">
                    <i class="ph ph-linkedin-logo"></i>
                    <span>LinkedIn Profile</span>
                </div>
                <i class="ph ph-arrow-right arrow-icon"></i>
            </a>

            <a href="mailto:aisha.putri@email.com" class="floating-btn" target="_blank">
                <div class="btn-left">
                    <i class="ph ph-envelope-simple"></i>
                    <span>Email Me</span>
                </div>
                <i class="ph ph-arrow-right arrow-icon"></i>
            </a>

            <a href="https://wa.me/628123456789" class="floating-btn" target="_blank">
                <div class="btn-left">
                    <i class="ph ph-whatsapp-logo"></i>
                    <span>WhatsApp Chat</span>
                </div>
                <i class="ph ph-arrow-right arrow-icon"></i>
            </a>
        </section>

        <!-- Portfolio: Icon Cards (No Border) -->
        <section>
            <div class="section-label">Selected Works</div>
            <div class="portfolio-grid">
                
                <!-- Porto 1 -->
                <a href="#" class="portfolio-card" target="_blank">
                    <i class="ph ph-device-mobile portfolio-icon"></i>
                    <div class="portfolio-info">
                        <div class="portfolio-title">Fintech App</div>
                        <div class="portfolio-cat">UX Case Study</div>
                    </div>
                </a>

                <!-- Porto 2 -->
                <a href="#" class="portfolio-card" target="_blank">
                    <i class="ph ph-laptop portfolio-icon"></i>
                    <div class="portfolio-info">
                        <div class="portfolio-title">E-Commerce</div>
                        <div class="portfolio-cat">UI Design</div>
                    </div>
                </a>

            </div>
        </section>

        <!-- Footer Socials -->
        <footer class="footer">
            <a href="#" class="social-icon" target="_blank"><i class="ph ph-instagram-logo"></i></a>
            <a href="#" class="social-icon" target="_blank"><i class="ph ph-behance-logo"></i></a>
            <a href="#" class="social-icon" target="_blank"><i class="ph ph-dribbble-logo"></i></a>
        </footer>

        <div class="copyright">
            © 2026 Aisha Putri. Pure Minimalist.
        </div>

    </div>

</body>
</html>
